<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Issues Tracker Login</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen px-4">
<div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md text-center">

<h1 class="text-2xl font-bold text-purple-700 mb-2">
GitHub Issues Tracker
</h1>

<p class="text-gray-500 mb-6">
Sign in to manage your issues
</p>

<input id="username"
class="border w-full p-2 rounded mb-3"
placeholder="Username">

<input id="password"
type="password"
class="border w-full p-2 rounded mb-4"
placeholder="Password">

<button id="loginBtn"
class="w-full bg-purple-600 text-white py-2 rounded">
Sign In
</button>

<p class="text-sm text-gray-400 mt-4">
Username: admin <br>
Password: admin123
</p>

</div>

<script src="login.js"></script>

</body>
</html>
