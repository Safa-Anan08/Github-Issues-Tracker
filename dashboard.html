<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Issues Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
<!-- nav bar -->
<nav class="flex flex-col md:flex-row gap-2 items-center p-4 bg-white shadow ">


<h1 class=" flex items-center gap-3 text-2xl font-bold  text-black-700"><img class="h-10" src="./assets/github-logo.png" alt="">
GitHub Issues Tracker
</h1>

<input id="searchInput"
class="border px-3 py-1 rounded w-64"
placeholder="Search issues...">

</nav>
<!-- banner counting -->
<div class="max-w-6xl mx-auto mt-6 bg-white shadow rounded-lg p-6 mb-6 flex flex-col md:flex-row md:justify-between md:items-center gap-4">


<div class="flex items-center gap-4">

<div class="bg-purple-100 text-purple-600 p-3 rounded-full text-xl">
<img src="./assets/Aperture.png" alt="">
</div>

<div>

<h2 class="text-2xl font-bold">
<span id="issueCount">0</span> Issues
</h2>

<p class="text-gray-500 text-sm">
Track and manage your project issues 
</p>

</div>

</div>

<div class="flex gap-6 text-sm">

<div class="flex items-center gap-2">

<span class="w-3 h-3 bg-green-500 rounded-full"></span>

<p class="font-semibold text-green-600">
Open
</p>

</div>

<div class="flex items-center gap-2">

<span class="w-3 h-3 bg-purple-500 rounded-full"></span>

<p class="font-semibold text-purple-600">
Closed
</p>

</div>

</div>

</div>

<!--3 Tabs -->
<div class="max-w-6xl mx-auto mt-6">

<div class="flex gap-3 mb-6">

<button onclick="setActive(this);filterIssues('all')"
class="tab bg-purple-600 text-white px-4 py-1 rounded">
All </button>

<button onclick="setActive(this);filterIssues('open')"
class="tab bg-gray-200 px-4 py-1 rounded">
Open </button>

<button onclick="setActive(this);filterIssues('closed')"
class="tab bg-gray-200 px-4 py-1 rounded">
Closed </button>

</div>

<div id="issuesContainer"
class="grid lg:grid-cols-4 md:grid-cols-1 grid-cols-1 gap-6">
</div>

</div>


<div id="modal"
class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center">
</div>

<script src="script.js"></script>

</body>
</html>
